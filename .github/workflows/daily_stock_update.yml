name: Daily data jobs (Mon-Fri)

on:
  schedule:
    - cron: "30 1 * * 1-5"   # sync_stocks   → 7:00 AM IST
    - cron: "0 2 * * 1-5"    # update_metrics → 7:30 AM IST
  workflow_dispatch: {}

jobs:
  sync_stocks:
    if: github.event.schedule == '30 1 * * 1-5' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
      UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"
      - run: uv sync
      - run: uv run python -m app.sync_stocks

  update_stock_metrics:
    if: github.event.schedule == '0 2 * * 1-5' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
      UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - run: uv sync
      - run: uv run python -m app.update_stock_metrics