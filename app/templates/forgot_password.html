{% extends "base1.html" %}

{% block content %}
<style>
    :root {
        --bgColor: transparent;
        --inputColor: rgba(0, 180, 255, 0.6);
        --textColor: #e6f7ff;
        --size: 1.5rem;
    }

    body {
        background-image: url('../static/img/bull.jpg');
        background-size: cover;
        background-repeat: no-repeat;
        background-position: center;
        overflow-y: auto;
        min-height: 100vh;
        transition: background 0.5s ease;
    }

    body.dark-mode {
        background-image: none;
        background-color: #000;
    }

    body.dark-mode .container {
        color: #fff;
    }

    .container {
        margin-top: 50px;
        margin-bottom: 50px;
        display: flex;
        flex-direction: column;
        align-items: center;
        transition: color 0.5s ease;
    }

    /* Form card */
    .auth-form {
        background: rgba(0, 0, 0, 0.20);
        backdrop-filter: blur(5px);
        padding: 57px 45px;
        border-radius: 12px;
        width: 360px;
        box-shadow: 0 0 20px rgba(0, 180, 255, 0.4);
        transition: all 0.5s ease;
    }

    body.dark-mode .auth-form {
        background: rgba(0, 0, 0, 0.8);
        box-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
    }

    .auth-title {
        color: #e6f7ff;
        margin-top: 0;
        margin-bottom: 8px;
        text-shadow: 0 0 8px rgba(0, 180, 255, 0.8);
        transition: all 0.5s ease;
        text-align: center;
    }

    body.dark-mode .auth-title {
        color: #fff;
        text-shadow: 0 0 8px rgba(255, 255, 255, 0.5);
    }

    .subtitle {
        color: #bfe9ff;
        font-size: 14px;
        text-align: center;
        margin-bottom: 20px;
        transition: color 0.5s ease;
    }

    body.dark-mode .subtitle {
        color: #ccc;
    }

    .email-display {
        background: rgba(0, 180, 255, 0.1);
        border: 1px solid rgba(0, 180, 255, 0.3);
        padding: 10px;
        border-radius: 6px;
        text-align: center;
        margin-bottom: 15px;
        color: #4fd1ff;
        font-weight: bold;
        transition: all 0.5s ease;
    }

    body.dark-mode .email-display {
        background: rgba(255, 255, 255, 0.1);
        border-color: rgba(255, 255, 255, 0.3);
        color: #fff;
    }

    .password-wrapper {
        position: relative;
        margin-bottom: 15px;
    }

    .auth-form input {
        width: 100%;
        padding: 12px;
        margin-bottom: 15px;
        background: rgba(255, 255, 255, 0.1);
        border: 1px solid rgba(0, 180, 255, 0.6);
        border-radius: 6px;
        color: #ffffff;
        outline: none;
        transition: all 0.5s ease;
        box-sizing: border-box;
    }

    .password-wrapper input {
        padding-right: 2.5rem;
        margin-bottom: 0;
    }

    body.dark-mode .auth-form input {
        border-color: rgba(255, 255, 255, 0.6);
        background: rgba(255, 255, 255, 0.05);
    }

    .auth-form input::placeholder {
        color: #bfe9ff;
        transition: color 0.5s ease;
    }

    body.dark-mode .auth-form input::placeholder {
        color: #ccc;
    }

    .auth-form input:focus {
        border-color: #4fd1ff;
        box-shadow: 0 0 8px rgba(79, 209, 255, 0.8);
    }

    body.dark-mode .auth-form input:focus {
        border-color: #fff;
        box-shadow: 0 0 8px rgba(255, 255, 255, 0.5);
    }

    .btn {
        width: 100%;
        padding: 12px;
        background: linear-gradient(135deg, #00b4ff, #0072ff);
        border: none;
        border-radius: 6px;
        color: #fff;
        font-weight: bold;
        cursor: pointer;
        box-shadow: 0 0 10px rgba(0, 180, 255, 0.7);
        transition: all 0.5s ease;
        margin-top: 10px;
    }

    body.dark-mode .btn {
        background: linear-gradient(135deg, #fff, #ccc);
        color: #000;
        box-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
    }

    .btn:hover {
        opacity: 0.9;
    }

    .btn:disabled {
        opacity: 0.6;
        cursor: not-allowed;
    }

    a {
        color: #7dd3ff;
        text-decoration: none;
        transition: color 0.5s ease;
    }

    body.dark-mode a {
        color: #fff;
    }

    a:hover {
        text-decoration: underline;
    }

    p {
        margin-top: 15px;
        text-align: center;
    }

    /* Eye icon styles - EXACT COPY from login.html */
    .eye {
        position: absolute;
        right: 0.5rem;
        top: 50%;
        width: var(--size);
        height: var(--size);
        border: 2px solid #4fd1ff;
        border-radius: calc(var(--size) / 1.5) 0;
        transform: translateY(-50%) rotate(45deg);
        cursor: pointer;
        z-index: 10;
        transition: border-color 0.5s ease;
    }

    body.dark-mode .eye {
        border-color: #fff;
    }

    .eye:before, .eye:after {
        content: "";
        position: absolute;
        top: 0;
        right: 0;
        bottom: 0;
        left: 0;
        margin: auto;
        border-radius: 100%;
        transition: background 0.5s ease;
    }

    .eye:before {
        width: 60%;
        height: 60%;
        background: #4fd1ff;
    }

    body.dark-mode .eye:before {
        background: #fff;
    }

    .eye:after {
        width: 30%;
        height: 30%;
        background: transparent;
    }

    body.dark-mode .eye:after {
        background: #000;
    }

    /* Spotlight effect - EXACT COPY from login.html */
    .spotlight-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 5;
        opacity: 0;
        transition: opacity 0.5s ease;
    }

    .spotlight-overlay.active {
        opacity: 1;
    }

    .spotlight-beam {
        position: absolute;
        width: 0;
        height: 0;
        border-style: solid;
        border-width: 0;
        opacity: 0;
        transition: all 0.5s ease;
        right: 1rem;
        top: 50%;
        transform: translateY(-50%);
        pointer-events: none;
        z-index: 5;
    }

    .spotlight-beam.beam-active {
        opacity: 1;
        border-width: 70px 0 70px 560px;
        border-color: transparent transparent transparent rgba(255, 255, 0, 0.6);
    }

    /* Success message */
    .success-message, .error-message, .info-message {
        padding: 12px;
        border-radius: 6px;
        margin-bottom: 15px;
        text-align: center;
        font-size: 0.9em;
        display: none;
        transition: all 0.5s ease;
    }

    .success-message {
        background: rgba(0, 255, 100, 0.15);
        border: 1px solid rgba(0, 255, 100, 0.5);
        color: #ccffdd;
    }

    body.dark-mode .success-message {
        background: rgba(0, 255, 100, 0.2);
        border-color: rgba(0, 255, 100, 0.7);
    }

    .error-message {
        background: rgba(255, 0, 0, 0.15);
        border: 1px solid rgba(255, 0, 0, 0.5);
        color: #ffcccc;
    }

    body.dark-mode .error-message {
        background: rgba(255, 0, 0, 0.2);
        border-color: rgba(255, 0, 0, 0.7);
    }

    .info-message {
        background: rgba(0, 180, 255, 0.15);
        border: 1px solid rgba(0, 180, 255, 0.5);
        color: #bfe9ff;
    }

    body.dark-mode .info-message {
        background: rgba(0, 180, 255, 0.2);
        border-color: rgba(0, 180, 255, 0.7);
        color: #e6f7ff;
    }

    .step {
        display: none;
    }

    .step.active {
        display: block;
    }

    .resend-link {
        text-align: center;
        margin-top: 15px;
        font-size: 14px;
        color: #bfe9ff;
    }

    body.dark-mode .resend-link {
        color: #ccc;
    }

    .resend-link a {
        cursor: pointer;
        font-weight: bold;
    }
</style>

<div class="spotlight-overlay" id="spotlightOverlay"></div>

<div class="container">
    <form class="auth-form">
        <h3 class="auth-title">Forgot Password</h3>
        
        <div class="success-message" id="successMessage"></div>
        <div class="error-message" id="errorMessage"></div>
        <div class="info-message" id="infoMessage"></div>
        
        <!-- Step 1: Email Input -->
        <div class="step active" id="step1">
            <p class="subtitle">Enter your registered email address</p>
            <input type="email" id="emailInput" placeholder="Email" required>
            <button class="btn" type="button" id="sendCodeBtn" onclick="sendResetCode()">Send Reset Code</button>
        </div>
        
        <!-- Step 2: Code Verification -->
        <div class="step" id="step2">
            <p class="subtitle">Enter the 6-digit code sent to:</p>
            <div class="email-display" id="emailDisplay"></div>
            <input 
                type="text" 
                id="codeInput" 
                maxlength="6" 
                pattern="[0-9]{6}" 
                placeholder="000000"
                style="text-align: center; letter-spacing: 5px; font-weight: bold;"
                required>
            <button class="btn" type="button" id="verifyCodeBtn" onclick="verifyCode()">Verify Code</button>
            <div class="resend-link">
                Didn't receive the code? 
                <a onclick="resendCode()">Resend Code</a>
            </div>
        </div>
        
        <!-- Step 3: Reset Password -->
        <div class="step" id="step3">
            <p class="subtitle">Enter your new password</p>
            
            <div class="password-wrapper">
                <input type="password" id="newPassword" placeholder="New Password" required>
                <div class="spotlight-beam" id="beam1"></div>
                <div class="eye" id="togglePassword1"></div>
            </div>
            
            <div class="password-wrapper">
                <input type="password" id="confirmPassword" placeholder="Confirm Password" required>
                <div class="spotlight-beam" id="beam2"></div>
                <div class="eye" id="togglePassword2"></div>
            </div>
            
            <button class="btn" type="button" id="resetBtn" onclick="resetPassword()">Reset Password</button>
        </div>
    </form>

    <p>
        <a href="/login">← Back to Login</a>
    </p>
</div>

<script>
    let userEmail = '';
    let verificationCode = '';
    const body = document.body;
    const spotlightOverlay = document.getElementById('spotlightOverlay');
    
    // Password eye toggles - will be set up when step 3 is shown
    let togglePassword1, password1, beam1;
    let togglePassword2, password2, beam2;
    
    // Setup password toggles for step 3
    function setupPasswordToggles() {
        togglePassword1 = document.getElementById('togglePassword1');
        password1 = document.getElementById('newPassword');
        beam1 = document.getElementById('beam1');
        
        togglePassword2 = document.getElementById('togglePassword2');
        password2 = document.getElementById('confirmPassword');
        beam2 = document.getElementById('beam2');
        
        // First password eye - toggles dark mode
        togglePassword1.addEventListener('click', function() {
        const type = password1.getAttribute('type') === 'password' ? 'text' : 'password';
        password1.setAttribute('type', type);
        beam1.classList.toggle('beam-active');
        const anyActive = beam1.classList.contains('beam-active') || beam2.classList.contains('beam-active');
        body.classList.toggle('dark-mode', anyActive);
        spotlightOverlay.classList.toggle('active', anyActive);
    });
        
    togglePassword2.addEventListener('click', function() {
        const type = password2.getAttribute('type') === 'password' ? 'text' : 'password';
        password2.setAttribute('type', type);
        beam2.classList.toggle('beam-active');
        const anyActive = beam1.classList.contains('beam-active') || beam2.classList.contains('beam-active');
        body.classList.toggle('dark-mode', anyActive);
        spotlightOverlay.classList.toggle('active', anyActive);
    });
    }
    
    // Send reset code
    async function sendResetCode() {
        const email = document.getElementById('emailInput').value.trim();
        
        if (!email) {
            showError('Please enter your email address');
            return;
        }
        
        // Disable button
        const btn = document.getElementById('sendCodeBtn');
        btn.disabled = true;
        btn.textContent = 'Sending...';
        
        hideMessages();
        
        try {
            const response = await fetch(`/auth/request-password-reset?email=${encodeURIComponent(email)}`, {
                method: 'POST'
            });
            
            const result = await response.json();
            
            if (response.ok) {
                userEmail = email;
                document.getElementById('emailDisplay').textContent = email;
                showSuccess('Reset code sent to your email!');
                
                // Show dev code in console/message
                if (result.dev_code) {
                    console.log('Development Code:', result.dev_code);
                    showInfo(`Dev Mode - Code: ${result.dev_code}`);
                }
                
                // Move to step 2 after 2 seconds
                setTimeout(() => {
                    showStep(2);
                }, 2000);
            } else {
                showError(result.detail || 'Failed to send reset code');
                btn.disabled = false;
                btn.textContent = 'Send Reset Code';
            }
        } catch (error) {
            console.error('Error:', error);
            showError('An error occurred. Please try again.');
            btn.disabled = false;
            btn.textContent = 'Send Reset Code';
        }
    }
    
    // Resend code
    async function resendCode() {
        hideMessages();
        showInfo('Sending reset code...');
        
        try {
            const response = await fetch(`/auth/request-password-reset?email=${encodeURIComponent(userEmail)}`, {
                method: 'POST'
            });
            
            const result = await response.json();
            
            if (response.ok) {
                showSuccess('Reset code sent to your email!');
                
                if (result.dev_code) {
                    console.log('Development Code:', result.dev_code);
                    showInfo(`Dev Mode - Code: ${result.dev_code}`);
                }
            } else {
                showError(result.detail || 'Failed to send reset code');
            }
        } catch (error) {
            console.error('Error:', error);
            showError('An error occurred. Please try again.');
        }
    }
    
    // Verify code
    async function verifyCode() {
        const code = document.getElementById('codeInput').value.trim();
        
        if (!code || code.length !== 6) {
            showError('Please enter a 6-digit code');
            return;
        }
        
        const btn = document.getElementById('verifyCodeBtn');
        btn.disabled = true;
        btn.textContent = 'Verifying...';
        
        hideMessages();
        
        try {
            const response = await fetch(`/auth/verify-reset-code?email=${encodeURIComponent(userEmail)}&code=${code}`, {
                method: 'POST'
            });
            
            const result = await response.json();
            
            if (response.ok) {
                verificationCode = code;
                showSuccess('Code verified! Set your new password.');
                
                setTimeout(() => {
                    showStep(3);
                    setupPasswordToggles();
                }, 1500);
            } else {
                showError(result.detail || 'Invalid code');
                btn.disabled = false;
                btn.textContent = 'Verify Code';
            }
        } catch (error) {
            console.error('Error:', error);
            showError('An error occurred. Please try again.');
            btn.disabled = false;
            btn.textContent = 'Verify Code';
        }
    }
    
    // Reset password
    async function resetPassword() {
        const newPass = document.getElementById('newPassword').value;
        const confirmPass = document.getElementById('confirmPassword').value;
        
        if (!newPass || !confirmPass) {
            showError('Please fill in both password fields');
            return;
        }
        
        if (newPass.length < 6) {
            showError('Password must be at least 6 characters');
            return;
        }
        
        if (newPass !== confirmPass) {
            showError('Passwords do not match');
            return;
        }
        
        const btn = document.getElementById('resetBtn');
        btn.disabled = true;
        btn.textContent = 'Resetting...';
        
        hideMessages();
        
        try {
            const response = await fetch('/auth/reset-password', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    email: userEmail,
                    code: verificationCode,
                    new_password: newPass
                })
            });
            
            const result = await response.json();
            
            if (response.ok) {
                showSuccess('Password reset successful! Redirecting to login...');
                
                setTimeout(() => {
                    window.location.href = '/login?message=' + encodeURIComponent('Password reset successful. Please login with your new password.');
                }, 2000);
            } else {
                showError(result.detail || 'Failed to reset password');
                btn.disabled = false;
                btn.textContent = 'Reset Password';
            }
        } catch (error) {
            console.error('Error:', error);
            showError('An error occurred. Please try again.');
            btn.disabled = false;
            btn.textContent = 'Reset Password';
        }
    }
    
    // Show specific step
    function showStep(stepNumber) {
        document.querySelectorAll('.step').forEach(step => {
            step.classList.remove('active');
        });
        document.getElementById(`step${stepNumber}`).classList.add('active');
        hideMessages();
    }
    
    // Message functions
    function showSuccess(message) {
        hideMessages();
        const elem = document.getElementById('successMessage');
        elem.textContent = message;
        elem.style.display = 'block';
    }
    
    function showError(message) {
        hideMessages();
        const elem = document.getElementById('errorMessage');
        elem.textContent = message;
        elem.style.display = 'block';
    }
    
    function showInfo(message) {
        hideMessages();
        const elem = document.getElementById('infoMessage');
        elem.textContent = message;
        elem.style.display = 'block';
    }
    
    function hideMessages() {
        document.getElementById('successMessage').style.display = 'none';
        document.getElementById('errorMessage').style.display = 'none';
        document.getElementById('infoMessage').style.display = 'none';
    }
    
    // Only allow numbers in code input
    document.getElementById('codeInput').addEventListener('input', (e) => {
        e.target.value = e.target.value.replace(/[^0-9]/g, '');
    });
</script>
{% endblock %}
